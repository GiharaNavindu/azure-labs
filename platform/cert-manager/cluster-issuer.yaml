apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # The Let's Encrypt staging API
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: raviherath@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: public-gateway
            namespace: platform-gateway
            kind: Gateway